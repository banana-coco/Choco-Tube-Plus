<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>チャンネル — Inv-tube</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body class="page-channel">
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-inv">Inv</span><span class="logo-tube">-tube</span>
      </a>
      <div class="search-wrapper">
        <form class="search-form" id="searchForm">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="動画を検索..."
            autocomplete="off"
          />
          <button type="submit" class="search-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </form>
        <ul id="suggestions" class="suggestions-list" hidden></ul>
      </div>
      <nav class="header-nav">
        <a href="/dl" class="header-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          ダウンロード
        </a>
        <a href="/library" class="header-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          ライブラリ
        </a>
        <a href="/settings" class="header-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          設定
        </a>
      </nav>
    </div>
  </header>

  <div id="channelHero" class="channel-hero" hidden>
    <div class="channel-banner-wrap" id="channelBannerWrap">
      <img class="channel-banner" id="channelBanner" alt="" />
    </div>
    <div class="channel-info-wrap">
      <div class="channel-avatar-wrap">
        <img class="channel-avatar" id="channelAvatar" alt="" />
      </div>
      <div class="channel-meta">
        <h1 class="channel-name" id="channelName"></h1>
        <div class="channel-sub-meta" id="channelSubMeta"></div>
        <p class="channel-desc" id="channelDesc"></p>
        <button class="channel-desc-toggle" id="channelDescToggle" hidden>もっと見る</button>
        <button class="sub-btn" id="channelSubBtn" hidden></button>
      </div>
    </div>
  </div>

  <div id="channelHeroSkeleton" class="channel-hero-skeleton">
    <div class="skeleton-banner"></div>
    <div class="channel-info-wrap">
      <div class="channel-avatar-wrap">
        <div class="skeleton-avatar-lg"></div>
      </div>
      <div class="channel-meta">
        <div class="skeleton-line" style="width:200px;height:20px;margin-bottom:10px;border-radius:6px;"></div>
        <div class="skeleton-line" style="width:260px;height:13px;margin-bottom:8px;border-radius:5px;"></div>
        <div class="skeleton-line" style="width:340px;height:12px;border-radius:5px;"></div>
      </div>
    </div>
  </div>

  <div class="channel-tabs-bar" id="channelTabsBar">
    <div class="channel-tabs-inner">
      <button class="ch-tab active" data-tab="home">ホーム</button>
      <button class="ch-tab" data-tab="videos">動画</button>
      <button class="ch-tab" data-tab="latest">最新</button>
      <button class="ch-tab" data-tab="shorts">ショート</button>
      <button class="ch-tab" data-tab="streams">ライブ</button>
      <button class="ch-tab" data-tab="playlists">プレイリスト</button>
      <button class="ch-tab" data-tab="community">コミュニティ</button>
      <button class="ch-tab" data-tab="search">チャンネル内検索</button>
    </div>
  </div>

  <main>
    <div id="tabControls" class="tab-controls">
      <div id="sortControls" class="sort-controls">
        <label class="filter-label">並び順</label>
        <select id="sortSelect" class="filter-select">
          <option value="newest">新しい順</option>
          <option value="oldest">古い順</option>
          <option value="popular">人気順</option>
        </select>
      </div>
      <div id="channelSearchForm" class="channel-search-form" hidden>
        <form id="chSearchForm" class="ch-search-bar">
          <input type="text" id="chSearchInput" class="search-input" placeholder="チャンネル内を検索..." autocomplete="off" />
          <button type="submit" class="search-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </form>
      </div>
    </div>

    <div id="contentArea">
      <div id="homeArea" class="home-area" hidden></div>
      <div id="contentGrid" class="video-grid"></div>
      <div id="communityArea" class="community-area" hidden></div>
    </div>

    <div class="ch-load-more-wrap" id="loadMoreWrap" hidden>
      <button class="ch-load-more" id="loadMoreBtn">もっと見る</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
